name: 仓库规则

on:
  create:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  branch-creation-guard:
    name: 分支创建权限检查
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 删除未授权分支
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              'juyangokok',
              'weinachuan',
              'weiwei-612',
              'woey',
              'zhangshuolei-hfut',
              'chen-linxin',
            ]);
            const actor = context.actor;
            const branch = context.payload.ref;
            if (allowed.has(actor)) {
              core.notice(`${actor} 允许在主仓库创建分支。`);
              return;
            }

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
            });
            core.setFailed(
              `${actor} 无权在主仓库创建分支 "${branch}"。` +
              '请先 fork 本仓库，再从个人仓库向主仓库提交 Pull Request。'
            );

  pull-request-author:
    name: 自动填写 PR 提交人
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 填写 PR 提交人
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const authorLine = `- 责任人 / 提交人: @${pr.user.login}`;
            const marker = /- 责任人 \/ 提交人:[^\n]*/;
            if (!marker.test(body)) {
              core.notice('PR 描述中没有找到责任人 / 提交人标记。');
              return;
            }
            const nextBody = body.replace(marker, authorLine);
            if (nextBody === body) {
              core.notice('PR 提交人已经填写。');
              return;
            }
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: nextBody,
            });

  required-reviewers:
    name: 维护者检视状态更新
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: 检查维护者审批数量
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NPU_CI_BOT_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.notice('没有找到 Pull Request 事件信息。');
              return;
            }
            const contextName = '仓库规则 / 维护者检视门禁';
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const setGateStatus = async (state, description) => {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state,
                context: contextName,
                description,
                target_url: targetUrl,
              });
            };
            if (pr.draft) {
              await setGateStatus('pending', '等待 PR 标记为 ready for review');
              core.notice('草稿 PR 暂不检查检视门禁，标记为 ready for review 后再检查。');
              return;
            }

            const maintainers = new Set([
              'juyangokok',
              'weinachuan',
              'weiwei-612',
              'woey',
              'zhangshuolei-hfut',
              'chen-linxin',
            ]);
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const approvals = new Map();
            for (const review of reviews) {
              const login = review.user && review.user.login;
              if (!login || !maintainers.has(login) || login === pr.user.login) {
                continue;
              }
              if (review.state === 'APPROVED' && review.commit_id === pr.head.sha) {
                approvals.set(login, review);
              } else if (review.state === 'CHANGES_REQUESTED' || review.state === 'DISMISSED') {
                approvals.delete(login);
              }
            }

            const approvedBy = [...approvals.keys()].sort();
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedLines = (file) => (file.patch || '')
              .split('\n')
              .filter((line) => /^[+-]/.test(line) && !line.startsWith('+++') && !line.startsWith('---'))
              .map((line) => line.slice(1).trim())
              .filter((line) =>
                line &&
                !line.startsWith('//') &&
                !line.startsWith('/*') &&
                !line.startsWith('*')
              );
            const hasChangedLine = (file, pattern) => changedLines(file).some((line) => pattern.test(line));
            const isDeletedOrRenamed = (file) => ['removed', 'renamed'].includes(file.status);

            const abiFindings = [];
            for (const file of files) {
              const path = file.filename.replace(/\\/g, '/');
              const noPatch = !file.patch;
              if (/^fla\/ops\/.*\/op_host\/.*_def\.cpp$/.test(path)) {
                const pattern = /\b(Input|Output|Attr)\s*\(|\.(ParamType|DataType|DataTypeList|Format|FormatList|ValueDepend|AttrType|Int|Float|Bool|String)\s*\(/;
                if (isDeletedOrRenamed(file) || noPatch || hasChangedLine(file, pattern)) {
                  abiFindings.push(`${path}: 算子 def 输入/输出/属性 ABI 可能变化`);
                }
              } else if (/^fla\/ops\/.*\/op_host\/op_api\/aclnn_.*\.(h|cpp)$/.test(path)) {
                const pattern = /\baclnn[A-Za-z0-9_]*(GetWorkspaceSize)?\s*\(|\b(const\s+)?acl(Tensor|TensorList|IntArray|Scalar|ScalarList|BoolArray|FloatArray)\s*\*|\b(int64_t|uint64_t|double|float|bool|aclrtStream|aclOpExecutor)\b/;
                if (isDeletedOrRenamed(file) || noPatch || hasChangedLine(file, pattern)) {
                  abiFindings.push(`${path}: aclnn 接口入参/返回 ABI 可能变化`);
                }
              } else if (/^torch_custom\/fla_npu\/(npu_custom|test_native_functions|deprecated)\.yaml$/.test(path)) {
                const pattern = /^\s*(-\s*)?func:\s*|^\s*op_api:\s*|^\s*dispatch:\s*|^\s*variants:\s*/;
                if (isDeletedOrRenamed(file) || noPatch || hasChangedLine(file, pattern)) {
                  abiFindings.push(`${path}: torch Python/C++ 接口 schema 可能变化`);
                }
              } else if (/^torch_custom\/fla_npu\/op_plugin\/ops\/opapi\/.*\.(h|hpp|cpp)$/.test(path)) {
                const pattern = /\bnpu_[A-Za-z0-9_]+\s*\(|\bat::Tensor\b|\bc10::optional\b|\bat::OptionalIntArrayRef\b|\b(int64_t|double|float|bool)\b|TORCH_LIBRARY|m\.def\s*\(/;
                if (isDeletedOrRenamed(file) || noPatch || hasChangedLine(file, pattern)) {
                  abiFindings.push(`${path}: torch 接口入参/适配 ABI 可能变化`);
                }
              }
            }
            const needAbiOwnerApproval = abiFindings.length > 0;
            const abiOwnerApproved = approvals.has('weinachuan');

            await core.summary
              .addHeading('仓库检视门禁')
              .addRaw(`要求的维护者审批数：2\n\n`)
              .addRaw(`当前 head SHA：${pr.head.sha}\n\n`)
              .addRaw(`已通过检视：${approvedBy.length ? approvedBy.map((u) => `@${u}`).join(', ') : '暂无'}\n`)
              .addRaw(`\nABI 风险改动：${needAbiOwnerApproval ? '是' : '否'}\n`)
              .addRaw(`ABI 责任人 @weinachuan 审批：${abiOwnerApproved ? '已满足' : '未满足'}\n`)
              .addRaw(abiFindings.length ? `\nABI 风险文件：\n${abiFindings.map((item) => `- ${item}`).join('\n')}\n` : '')
              .write();

            const missingRequiredReviews = approvedBy.length < 2;
            const missingAbiOwner = needAbiOwnerApproval && !abiOwnerApproved;
            if (missingRequiredReviews || missingAbiOwner) {
              const reasons = [];
              if (missingRequiredReviews) {
                reasons.push(`维护者审批 ${approvedBy.length}/2`);
              }
              if (missingAbiOwner) {
                reasons.push('等待 @weinachuan ABI 审批');
              }
              const description = reasons.join('；').slice(0, 140);
              await setGateStatus('pending', description);
              core.notice(description);
              return;
            }

            await setGateStatus('success', '维护者审批门禁通过');
            core.notice('维护者审批门禁通过。');
