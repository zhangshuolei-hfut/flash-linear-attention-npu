name: Bug 反馈
description: 反馈 fla_npu 使用、构建、安装或算子运行问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请只填写可公开信息，不要粘贴账号、主机名、内网地址、绝对路径、临时目录、日志路径、token 或其他敏感信息。

        请优先运行标准环境采集脚本 `python scripts/collect_public_env.py`，并将输出粘贴到下方“环境信息”中。
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 请优先粘贴标准环境采集脚本 `python scripts/collect_public_env.py` 的输出；脚本不可用时，再手动填写 CANN 完整版本、Python、PyTorch、torch_npu、fla_npu wheel/commit、SOC、设备型号、安装方式、custom OPP 环境状态和 fla_npu runtime readiness。
      placeholder: |
        请运行：
        python scripts/collect_public_env.py

        并在此处粘贴输出。脚本不可用时，请手动填写：
        CANN 完整版本:
        Python:
        PyTorch:
        torch_npu:
        fla_npu wheel/commit:
        SOC:
        设备型号:
        安装方式:
        custom OPP 环境状态:
        fla_npu runtime readiness:
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现
      description: 请提供能够独立复现问题的最小代码、命令和输入参数。
      render: python
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: 完整报错
      description: 请粘贴完整错误栈或关键运行日志。提交前请确认不包含账号、主机名、内网地址、绝对路径、临时目录、日志路径或 token。
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 请说明你期望得到的结果，以及当前实际结果哪里不符合预期。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 可填写已尝试的规避方式、影响范围、相关公开链接等。
    validations:
      required: false
