  <path class="edge" d="M1095 403 H1318 V330" stroke="#5B7DB1" marker-end="url(#arrow-blue)"/>
  <text class="edge-label" x="380" y="264" text-anchor="middle" fill="#24466F">编译输入</text>
  <text class="edge-label" x="755" y="264" text-anchor="middle" fill="#6A4A00">生成</text>
  <text class="edge-label" x="1130" y="264" text-anchor="middle" fill="#6A4A00">内嵌</text>
  <text class="edge-label" x="1502" y="264" text-anchor="middle" fill="#244B2F">打包</text>
  <text class="edge-label" x="1205" y="394" text-anchor="middle" fill="#24466F">组装</text>

  <rect class="panel" x="30" y="520" width="1740" height="560" fill="#FBFCFE" stroke="#9BB0C7"/>
  <rect class="box" x="55" y="540" width="380" height="50" fill="#E9F7EE" stroke="#4C9B60"/>
  <text class="phase" x="245" y="572" text-anchor="middle" fill="#244B2F">运行期（目标 Python / conda 环境）</text>

  <rect class="box" x="60" y="625" width="245" height="110" fill="#FFFFFF" stroke="#4C9B60"/>
  <text x="183" text-anchor="middle"><tspan class="node-title" x="183" y="654">用户 / 外部 executor</tspan><tspan class="node-text" x="183" y="684">Python 模型代码</tspan><tspan class="node-text" x="183" y="710">设置目标 device 的 current stream</tspan></text>
  <rect class="box" x="365" y="625" width="285" height="125" fill="#EFF9F1" stroke="#4C9B60" stroke-width="2.5"/>
  <text x="387"><tspan class="node-title" x="387" y="652" fill="#244B2F">site-packages/fla_npu</tspan><tspan class="node-text" x="387" y="679">• 稳定 Python API</tspan><tspan class="node-text" x="387" y="702">• 参数与输出组织</tspan><tspan class="node-text" x="387" y="725">• autograd / mutation wrapper</tspan></text>
  <rect class="box" x="720" y="625" width="255" height="125" fill="#F4F0FF" stroke="#8266B5"/>
  <text x="848" text-anchor="middle"><tspan class="node-title" x="848" y="654" fill="#49366B">Python ctypes bridge</tspan><tspan class="node-text" x="848" y="686">aclTensor / int-array descriptor</tspan><tspan class="node-text" x="848" y="714">aclnn 两段式调用</tspan></text>
  <rect class="box" x="1045" y="625" width="280" height="125" fill="#FFF7E8" stroke="#D9970B"/>
  <text x="1185" text-anchor="middle"><tspan class="node-title" x="1185" y="654" fill="#5D4200">wheel 内嵌 OPP</tspan><tspan class="node-text" x="1185" y="686">libcust_opapi.so</tspan><tspan class="node-text" x="1185" y="714">op_host / tiling / kernel</tspan></text>
  <rect class="box" x="1395" y="625" width="325" height="135" fill="#FFF7E8" stroke="#D9970B" stroke-width="2.5"/>
  <text x="1418"><tspan class="node-title" x="1418" y="652" fill="#5D4200">CANN runtime / driver</tspan><tspan class="node-text" x="1418" y="679">• ACL / aclrt / aclnn</tspan><tspan class="node-text" x="1418" y="702">• OPP 注册与 executor</tspan><tspan class="node-text" x="1418" y="725">• workspace / stream launch</tspan></text>

  <rect class="box" x="60" y="870" width="265" height="140" fill="#F4F0FF" stroke="#8266B5" stroke-dasharray="7 5"/>
  <text x="82"><tspan class="node-title" x="82" y="898" fill="#49366B">可选 PyTorch 高阶能力</tspan><tspan class="node-text" x="82" y="928">• autograd</tspan><tspan class="node-text" x="82" y="952">• torch.library / schema</tspan><tspan class="node-text" x="82" y="976">• compile / export / FakeTensor</tspan></text>
  <rect class="box" x="365" y="855" width="285" height="120" fill="#EEF4FF" stroke="#5B7DB1"/>
  <text x="508" text-anchor="middle"><tspan class="node-title" x="508" y="884" fill="#24466F">PyTorch Python tensor API</tspan><tspan class="node-text" x="508" y="916">data_ptr / storage</tspan><tspan class="node-text" x="508" y="944">shape / stride / dtype / device</tspan></text>
  <rect class="box" x="720" y="835" width="330" height="140" fill="#EEF4FF" stroke="#5B7DB1"/>
  <text x="885" text-anchor="middle"><tspan class="node-title" x="885" y="864" fill="#24466F">Ascend PyTorch NPU 运行时能力</tspan><tspan class="node-text" x="885" y="897">通常由 torch_npu 提供</tspan><tspan class="node-text" x="885" y="925">NPU device / allocator / guard</tspan><tspan class="node-text" x="885" y="950">current stream</tspan></text>
  <rect class="box" x="1450" y="885" width="220" height="110" fill="#FFF1F1" stroke="#D85C5C" stroke-width="2.5"/>
  <text x="1560" text-anchor="middle"><tspan class="node-title" x="1560" y="916" fill="#7A2929">目标 NPU</tspan><tspan class="node-text" x="1560" y="947">指定 SoC kernel</tspan><tspan class="node-text" x="1560" y="973">按 stream 异步执行</tspan></text>

  <!-- Runtime call flow. -->
  <path class="edge" d="M305 680 H365" stroke="#4C9B60" marker-end="url(#arrow-green)"/>
