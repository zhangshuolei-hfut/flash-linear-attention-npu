  <text class="edge-label" x="682" y="902" text-anchor="middle" fill="#24466F">NPU tensor / 内存</text>
  <text class="edge-label" x="675" y="780" fill="#24466F">device guard / current stream</text>
  <text class="edge-label" x="1180" y="916" fill="#24466F">ACL / aclrt 能力</text>
  <text class="edge-label" x="350" y="845" fill="#49366B">可选 adapter</text>

  <!-- The release artifact is installed into two runtime components via separate routes above the runtime panel. -->
  <path class="edge" d="M1607 330 V490 H508 V625" stroke="#7B8794" stroke-dasharray="7 5" marker-end="url(#arrow-gray)"/>
  <path class="edge" d="M1689 330 V505 H1185 V625" stroke="#7B8794" stroke-dasharray="7 5" marker-end="url(#arrow-gray)"/>
  <text class="edge-label" x="850" y="481" fill="#52606D">pip install：Python 包</text>
  <text class="edge-label" x="1335" y="520" fill="#52606D">pip install：内嵌 OPP</text>

  <rect class="box" x="230" y="1100" width="1340" height="45" fill="#F7F9FC" stroke="#9BB0C7" stroke-width="1.5"/>
  <text x="900" y="1129" text-anchor="middle" font-size="14" fill="#344054"><tspan font-weight="700">图例</tspan>　绿色：Python 调用　蓝色：运行时能力　橙色：CANN / OPP　紫色虚线：可选 PyTorch 适配　灰色虚线：wheel 安装　红框：隔离区或最终设备</text>
