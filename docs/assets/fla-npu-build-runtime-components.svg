<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160" role="img" aria-labelledby="title desc">
  <title id="title">fla_npu 构建期与运行期组件关系</title>
  <desc id="desc">展示 CANN 构建工具链、wheel、PyTorch tensor、Ascend PyTorch NPU 运行时能力、ctypes、OPP、CANN runtime 和 NPU 的上下游关系，并区分构建期与运行期依赖。</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#4C9B60"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#5B7DB1"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#D9970B"/></marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#8266B5"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#D85C5C"/></marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10" fill="none" stroke="#7B8794" stroke-width="1.5"/></marker>
    <style>
      text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #172033; letter-spacing: 0; }
      .panel { rx: 10; stroke-width: 1.5; }
      .box { rx: 8; stroke-width: 2; }
      .title { font-size: 27px; font-weight: 700; }
      .subtitle { font-size: 16px; font-weight: 700; fill: #C62828; }
      .phase { font-size: 19px; font-weight: 700; }
      .node-title { font-size: 16px; font-weight: 700; }
      .node-text { font-size: 14px; }
      .edge { fill: none; stroke-width: 2.4; }
      .edge-label { font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1800" height="1160" fill="#FFFFFF"/>
  <text class="title" x="900" y="54" text-anchor="middle">fla_npu 构建期与运行期组件关系</text>
  <text class="subtitle" x="900" y="90" text-anchor="middle">默认构建只固化 CANN / host / SoC 产物；PyTorch 与 Ascend NPU 能力在目标环境按运行时接口接入</text>

  <rect class="panel" x="30" y="120" width="1740" height="350" fill="#F8FAFD" stroke="#9BB0C7"/>
  <rect class="box" x="55" y="140" width="260" height="50" fill="#E8F1FF" stroke="#5B7DB1"/>
  <text class="phase" x="185" y="172" text-anchor="middle" fill="#24466F">构建期（发布机）</text>

  <rect class="box" x="60" y="215" width="285" height="115" fill="#FFFFFF" stroke="#5B7DB1"/>
  <text x="82"><tspan class="node-title" x="82" y="242">仓库算子源码</tspan><tspan class="node-text" x="82" y="269">• Ascend C kernel</tspan><tspan class="node-text" x="82" y="292">• op_host / tiling</tspan><tspan class="node-text" x="82" y="315">• op_api / aclnn</tspan></text>
  <rect class="box" x="415" y="215" width="305" height="115" fill="#FFF7E8" stroke="#D9970B"/>
  <text x="437"><tspan class="node-title" x="437" y="242" fill="#5D4200">CANN 构建工具链</tspan><tspan class="node-text" x="437" y="269">• CMake / compiler</tspan><tspan class="node-text" x="437" y="292">• op_host / tiling 编译</tspan><tspan class="node-text" x="437" y="315">• 目标 SoC kernel 编译</tspan></text>
  <rect class="box" x="790" y="215" width="305" height="115" fill="#FFF7E8" stroke="#D9970B"/>
  <text x="812"><tspan class="node-title" x="812" y="242" fill="#5D4200">OPP vendor 产物</tspan><tspan class="node-text" x="812" y="269">• libcust_opapi.so</tspan><tspan class="node-text" x="812" y="292">• op_host / tiling / proto</tspan><tspan class="node-text" x="812" y="315">• kernel object / config</tspan></text>
  <rect class="box" x="1165" y="215" width="305" height="115" fill="#EFF9F1" stroke="#4C9B60"/>
  <text x="1187"><tspan class="node-title" x="1187" y="242" fill="#244B2F">wheel 组装器</tspan><tspan class="node-text" x="1187" y="269">• 纯 Python ctypes wrapper</tspan><tspan class="node-text" x="1187" y="292">• Triton Python 源码映射</tspan><tspan class="node-text" x="1187" y="315">• 内嵌 OPP vendor 树</tspan></text>
  <rect class="box" x="1535" y="215" width="205" height="115" fill="#EFF9F1" stroke="#4C9B60" stroke-width="2.5"/>
  <text x="1638" text-anchor="middle"><tspan class="node-title" x="1638" y="246" fill="#244B2F">发布 wheel</tspan><tspan class="node-text" x="1638" y="276">py3-none-any</tspan><tspan class="node-text" x="1638" y="303">按 host / SoC 区分文件</tspan></text>

  <rect class="box" x="60" y="365" width="660" height="75" fill="#FFF1F1" stroke="#D85C5C" stroke-dasharray="8 5"/>
  <text x="390" text-anchor="middle"><tspan class="node-title" x="390" y="392" fill="#7A2929">默认构建隔离区：不进入 wheel 构建 ABI</tspan><tspan class="node-text" x="390" y="420" fill="#7A2929">ATen / c10　|　torch_npu op-plugin / libtorch_npu　|　CPython C extension　|　gcc / libstdc++ ABI</tspan></text>
  <rect class="box" x="790" y="365" width="305" height="75" fill="#EEF4FF" stroke="#5B7DB1"/>
  <text x="943" text-anchor="middle"><tspan class="node-title" x="943" y="393" fill="#24466F">仓库 Python 源码</tspan><tspan class="node-text" x="943" y="420">fla_npu 包 / Triton 映射 / metadata</tspan></text>

  <!-- Build artifact flow; all arrows stay in the gaps between components. -->
  <path class="edge" d="M345 273 H415" stroke="#5B7DB1" marker-end="url(#arrow-blue)"/>
  <path class="edge" d="M720 273 H790" stroke="#D9970B" marker-end="url(#arrow-amber)"/>
  <path class="edge" d="M1095 273 H1165" stroke="#D9970B" marker-end="url(#arrow-amber)"/>
